version: '3.8'

# Auto Marketer is the marketing half of the two-service stack.
# Pair it with the sibling `info-broker` service which supplies prospect
# profiles via REST. The two services may share the same Postgres
# instance — they use different databases (auto_marketer vs info_broker)
# and never read each other's tables.

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auto_marketer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auto-marketer-api:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
